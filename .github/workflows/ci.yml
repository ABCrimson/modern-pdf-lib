name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  RUST_TOOLCHAIN: 'stable'
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Lint & Type-check
  # ---------------------------------------------------------------------------
  lint-and-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  # ---------------------------------------------------------------------------
  # Build WASM modules
  # ---------------------------------------------------------------------------
  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/wasm/*/target
          key: cargo-wasm-${{ runner.os }}-${{ hashFiles('src/wasm/*/Cargo.toml', 'src/wasm/*/Cargo.lock') }}
          restore-keys: |
            cargo-wasm-${{ runner.os }}-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache WASM output
        uses: actions/cache@v4
        id: wasm-cache
        with:
          path: src/wasm/*/pkg
          key: wasm-pkg-${{ runner.os }}-${{ hashFiles('src/wasm/*/src/**/*.rs', 'src/wasm/*/Cargo.toml') }}

      - name: Build WASM crates
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: bash scripts/build-wasm.sh --release

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-modules
          path: src/wasm/*/pkg
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Build TypeScript
  # ---------------------------------------------------------------------------
  build-ts:
    name: Build TypeScript
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-modules
          path: src/wasm

      - name: Build with tsdown
        run: npm run build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Unit tests
  # ---------------------------------------------------------------------------
  test-unit:
    name: Unit Tests
    needs: build-ts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-modules
          path: src/wasm

      - name: Run unit tests
        run: npx vitest run --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Integration tests
  # ---------------------------------------------------------------------------
  test-integration:
    name: Integration Tests
    needs: build-ts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-modules
          path: src/wasm

      - name: Run integration tests
        run: npx vitest run tests/integration

  # ---------------------------------------------------------------------------
  # E2E tests (Playwright)
  # ---------------------------------------------------------------------------
  test-e2e:
    name: E2E Tests
    needs: build-ts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-modules
          path: src/wasm

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Benchmarks
  # ---------------------------------------------------------------------------
  benchmark:
    name: Benchmarks
    needs: build-ts
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-modules
          path: src/wasm

      - name: Run benchmarks
        run: npx vitest bench --reporter=json --outputFile=bench-results.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: bench-results.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Bundle size check
  # ---------------------------------------------------------------------------
  bundle-size:
    name: Bundle Size
    needs: build-ts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Measure bundle size
        run: |
          echo "## Bundle Size Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Measure raw size
          RAW_SIZE=$(wc -c < dist/index.js)
          echo "Raw ESM bundle: ${RAW_SIZE} bytes" >> "$GITHUB_STEP_SUMMARY"

          # Measure gzipped size
          GZIP_SIZE=$(gzip -c dist/index.js | wc -c)
          echo "Gzipped ESM bundle: ${GZIP_SIZE} bytes" >> "$GITHUB_STEP_SUMMARY"

          # Budget check: 50 KB gzipped max for core bundle
          BUDGET=51200
          if [ "$GZIP_SIZE" -gt "$BUDGET" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**OVER BUDGET**: ${GZIP_SIZE} bytes > ${BUDGET} bytes (50 KB)" >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Bundle size ${GZIP_SIZE} bytes exceeds budget of ${BUDGET} bytes (50 KB gzipped)"
            exit 1
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Within budget (${GZIP_SIZE} / ${BUDGET} bytes)" >> "$GITHUB_STEP_SUMMARY"
          fi
