name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

env:
  NODE_VERSION: '26.4'
  RUST_TOOLCHAIN: 'beta'

jobs:
  # ---------------------------------------------------------------------------
  # Full build (WASM + TypeScript)
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@beta
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-release-${{ runner.os }}-${{ hashFiles('src/wasm/*/Cargo.toml') }}
          restore-keys: |
            cargo-release-${{ runner.os }}-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci --legacy-peer-deps

      - name: Build WASM crates
        run: bash scripts/build-wasm.sh --release

      - name: Verify WASM binaries
        run: |
          for crate in libdeflate png ttf shaping jbig2 jpeg; do
            if ! ls src/wasm/${crate}/pkg/*.wasm 1>/dev/null 2>&1; then
              echo "::error::WASM binary missing for crate: ${crate}"
              exit 1
            fi
          done
          echo "All WASM binaries verified."

      - name: Build TypeScript
        run: npm run build

      - name: Verify dist is importable (ESM + CJS smoke)
        # The smoke gate imports every BUILT dist entry and asserts it links +
        # exposes its API — the check that actually guards the published artifact
        # (it catches the v0.28.0-class "unimportable package" bug that the unit
        # suite, running on src/, cannot). The full unit/integration suite is
        # gated by ci.yml on this exact commit (a tag is cut from a master commit
        # that ci.yml tests), so re-running the whole 6,900-test suite here is
        # redundant — and doing it in this same job (after the WASM+TS build) OOM'd
        # a fork worker. Tests live in ci.yml; this job builds, smokes, publishes.
        run: npm run smoke

      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist

      - name: Upload WASM modules
        uses: actions/upload-artifact@v7
        with:
          name: wasm-modules
          path: src/wasm/*/pkg

  # ---------------------------------------------------------------------------
  # Publish to npm
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci --legacy-peer-deps

      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Download WASM modules
        uses: actions/download-artifact@v8
        with:
          name: wasm-modules
          path: src/wasm

      - name: Update npm for trusted publishing
        run: npm install -g npm@latest

      - name: Publish to npm
        run: npm publish --provenance --access public

  # ---------------------------------------------------------------------------
  # GitHub Release with WASM binaries
  # ---------------------------------------------------------------------------
  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download WASM modules
        uses: actions/download-artifact@v8
        with:
          name: wasm-modules
          path: wasm-artifacts

      - name: Package WASM binaries
        run: |
          cd wasm-artifacts
          for dir in */pkg; do
            crate=$(dirname "$dir")
            tar -czf "../modern-pdf-wasm-${crate}.tar.gz" -C "$dir" .
          done
          cd ..

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section for this version from CHANGELOG.md
          BODY=$(sed -n "/^## \[${VERSION}\]/,/^## \[/p" CHANGELOG.md | sed '1d;$d' || echo "Release ${GITHUB_REF_NAME}")
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: modern-pdf-wasm-*.tar.gz
          generate_release_notes: true

# Docs are deployed by the dedicated docs.yml workflow on every push to master
# (decoupled from version tags), so there is no docs job here.
